name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build apk --release

      - run: flutter build appbundle --release

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build windows

      - shell: powershell
        run: |
          Compress-Archive `
          build/windows/x64/runner/Release/* `
          Windows-x64.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: Windows-x64.zip

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build linux

      - run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../Linux-x64.tar.gz .

      - uses: softprops/action-gh-release@v2
        with:
          files: Linux-x64.tar.gz

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build macos

      - run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent your_app_name.app MacOS.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/MacOS.zip
