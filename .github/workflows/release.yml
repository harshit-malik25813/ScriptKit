name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Add Fastforge to PATH
        shell: pwsh
        run: |
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Verify FastForge installation
        shell: pwsh
        run: |
          dart pub global list
          Get-ChildItem "$env:LOCALAPPDATA\Pub\Cache\bin"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build and stage Windows asset
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          fastforge release --name windows-x64

      - name: Upload staged Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: dist/release-assets/${{ github.ref_name }}/


  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            dpkg-dev \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            patchelf \
            p7zip-full \
            rpm \
            zip
            
          sudo apt-get install -y libfuse2 || \
          sudo apt-get install -y libfuse2t64

      - name: Install AppImage tooling
        run: |
          curl -L \
            -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Add Fastforge to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Build and stage Linux assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          fastforge release --name linux-x64

      - name: Upload staged Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: dist/release-assets/${{ github.ref_name }}/

  publish-release:
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
