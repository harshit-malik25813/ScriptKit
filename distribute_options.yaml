        package:
          platform: linux
          target: appimage
        publish:
          target: custom
          args:
            command: bash ./scripts/stage-release-asset.sh
            asset-suffix: linux-x86_64.AppImage
      - name: linux-deb
        package:
          platform: linux
          target: deb
        publish:
