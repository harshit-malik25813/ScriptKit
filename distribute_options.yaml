releases:
  - name: windows-x64
    jobs:
      - name: windows-exe
        package:
          platform: windows
          target: exe
        publish:
          target: custom
          args:
            command: bash ./scripts/stage-release-asset.sh
            asset-suffix: windows-x64.exe

  - name: macos-intel
    jobs:
      - name: macos-zip
        package:
          platform: macos
          target: zip
        publish:
          target: custom
          args:
            command: bash ./scripts/stage-release-asset.sh
            asset-suffix: macos-x64.zip

  - name: macos-arm64
    jobs:
      - name: macos-zip
        package:
          platform: macos
          target: zip
        publish:
          target: custom
          args:
            command: bash ./scripts/stage-release-asset.sh
            asset-suffix: macos-arm64.zip

  - name: linux-x64
    jobs:
